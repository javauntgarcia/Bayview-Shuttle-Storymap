<meta charset="UTF-8">

<title>Bayview Shuttle Header</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

  .header {
    position: relative;
    width: 100%;
    height: 200px;
    background: #ffffff;
    overflow: hidden;
  }

  .van {
    position: absolute;
    animation: drive linear infinite;
    will-change: left;
  }

  /* 5 lanes — different sizes, minimal overlap */
  /* Heights spread across the 200px header so they barely brush each other */
  .van-1 { height: 130px; bottom: 4px;   animation-duration: 9s;   animation-delay: 0s;    }
  .van-2 { height: 90px;  bottom: 100px; animation-duration: 6s;   animation-delay: -3s;   }
  .van-3 { height: 55px;  bottom: 148px; animation-duration: 4.2s; animation-delay: -1.5s; }
  .van-4 { height: 110px; bottom: 14px;  animation-duration: 11s;  animation-delay: -5s;   }
  .van-5 { height: 75px;  bottom: 110px; animation-duration: 7.5s; animation-delay: -2s;   }

  @keyframes drive {
    from { left: 105%; }
    to   { left: -38%; }
  }
</style>
</head>
